              <path fill="currentColor" d="M12 2a5 5 0 0 0-5 5v2.2c0 .7-.2 1.4-.6 2L4.7 14a1 1 0 0 0 .8 1.5h13a1 1 0 0 0 .8-1.5l-1.7-2.8c-.4-.6-.6-1.3-.6-2V7a5 5 0 0 0-5-5Zm0 20a3 3 0 0 0 2.8-2H9.2A3 3 0 0 0 12 22Z"/>

          </button>

            <div class="notifications-head">

          </div>
        </div>

              <path fill="currentColor" d="M5 3h8a2 2 0 0 1 2 2v3h-2V5H5v14h8v-3h2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Zm11.3 5.3L20 12l-3.7 3.7-1.4-1.4 1.3-1.3H9v-2h7.2l-1.3-1.3 1.4-1.4Z"/>

        <div id="app-version" class="muted app-version"></div>
      </div>    </aside>
    <main id="content">
      <header class="app-header">
        <div>
          <h1 id="page-title"></h1>
          <div id="page-desc" class="muted"></div>
        </div>
      </header>

    </main>

  <div class="modal" id="stepup-modal" hidden>
    <div class="modal-backdrop" data-close-stepup></div>
    <div class="modal-body" role="dialog" aria-modal="true" aria-labelledby="stepup-title">
      <div class="modal-header">
        <h3 id="stepup-title" data-i18n="auth.stepup.title">Подтверждение личности</h3>
      </div>
      <div class="modal-content">
        <p class="muted" id="stepup-subtitle" data-i18n="auth.stepup.subtitle">Требуется дополнительная проверка безопасности.</p>
        <div class="alert" id="stepup-alert" hidden></div>
        <div class="form-grid single-column">
          <div class="form-field required">
            <label for="stepup-password" data-i18n="auth.stepup.password">Пароль</label>
            <input id="stepup-password" type="password" autocomplete="current-password">
          </div>
          <div class="form-field required" id="stepup-code-row" hidden>
            <label for="stepup-code" data-i18n="auth.stepup.code">Код TOTP</label>
            <input id="stepup-code" type="text" inputmode="numeric" autocomplete="one-time-code">
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn primary" id="stepup-password-btn" data-i18n="auth.stepup.passwordConfirm">Подтвердить пароль</button>
        <button type="button" class="btn primary" id="stepup-totp-btn" data-i18n="auth.stepup.totpConfirm" hidden>Подтвердить TOTP</button>
        <button type="button" class="btn ghost" id="stepup-passkey-btn" data-i18n="auth.stepup.passkeyConfirm" hidden>Подтвердить passkey</button>
        <button type="button" class="btn ghost" id="stepup-logout-btn" data-i18n="auth.stepup.logout">Выйти</button>
      </div>
    </div>
